name: Candidate Detection Evidence Harness

on:
  push:
  pull_request:

jobs:
  candidate-detection:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: candidate-detection
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm run produce-candidate-ledger
      - name: Run public-safe real repo detection
        run: |
          git clone --depth 1 https://github.com/spring-petclinic/spring-framework-petclinic.git "$RUNNER_TEMP/spring-framework-petclinic"
          TARGET_COMMIT="$(git -C "$RUNNER_TEMP/spring-framework-petclinic" rev-parse HEAD)"
          npm run detect -- --repo "$RUNNER_TEMP/spring-framework-petclinic" --case spring-framework-petclinic --out-dir "$RUNNER_TEMP/spring-framework-petclinic-v0-4" --target-commit "$TARGET_COMMIT"
